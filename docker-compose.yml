services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: finance-app
    volumes:
      - .:/var/www/html
    networks:
      - laravel_net

  web:
    image: nginx:alpine
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_net

  mysql:
    image: mysql:8.0
    container_name: finance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance
    ports:
      - "3308:3306"
    networks:
      - laravel_net
    volumes:
      - finance_mysql:/var/lib/mysql

  node:
    image: node:20
    container_name: finance-vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "5175:5173"
    networks:
      - laravel_net

networks:
  laravel_net:

volumes:
  finance_mysql:
